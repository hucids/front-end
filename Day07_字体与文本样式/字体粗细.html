<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 引入艺术字 */
        @font-face {
            /* 给字体命名 */
            font-family: "qq";
            /* 引入艺术字体文件 */
            src: url(./年少时的希翼.ttf);
        }
        /* 使用艺术字 */
        div{
            /* 填写自己取的名字 */
            font-family: "qq", 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>
    <!-- 字体粗细  font-weight
     取值方式:
     1.关键字取值
        -normal 默认字体粗细
        -bold 加粗字体(700)
        -lighter 变细(200)
     2.数值取值
        100-900之间整百数来设置字体粗细(400默认) -->

    <!-- 字体名称  font-family 通常会有几个取值 起备用作用 最后一种字体一定要常见 确保能显示
     可通过windows中的font文件来查看电脑拥有的字体
     字体名称包含中文或空格 要用引号括起来
     
     艺术字 要下载其字体ttf文件 见https://www.zitijia.com/  引入见上 -->
     <div>艺术字yishuzi</div>
     <P>艺术字yishuzi</P>

</body>
</html>
