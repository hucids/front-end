<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            color: rgba(240, 113, 113, 0.959);
        }
    </style>
</head>
<body>
    <!-- 字体颜色 color 默认黑色
     取值:
     1.颜色英语单词  表示颜色有限
     2.十六进制取值  语法:#RRGGBB  每个量取值从00-ff 可手动调节
        简写:两两相同可简写  #FF0000 -> #F00
     3.RGB函数取值  语法:rgb(red,green,blue) 每个量取值从0-255
     4.RGBA函数取值  语法:rgba(red,green,blue,alpha) 0-255 透明度0-1
    -->
    <div>我的散文诗</div>
</body>
</html>
