<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第七个网页</title>
    <style>
        html{
            font-size: 20px;
        }
        div{
            background-color: orange;
            width: 100px;
            height: 100px;
            /* font-size: 0.5em; */
            font-size: 1rem;
        }
        .one{
            background-color: red;
            width: 300px;
            height: 300px;
            /* font-size: 40px; */
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <!-- 字体大小 font-size -->
    <!-- 浏览器有默认字体大小 14/16px
     取值方式:
     -px: 固定像素值单位 已知比例下改动麻烦
     -em/百分比取值: 相对于父元素的字体大小的倍数
     -rem: 相对于根元素(html)的字体大小的倍数 html改动 整个网页按比例变化
    -->
     <div class="one">一本书
        <div>天才在左</div>
        <div>疯子在右</div>
     </div>
     
</body>
</html>
