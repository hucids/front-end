<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a{
            /* 去除a标签的默认下划线 */
            text-decoration: underline;
            color: black;
            /* 更改装饰线颜色 */
            text-decoration-color: brown;
            /* 更改装饰线样式 */
            text-decoration-style: solid;
        }
    </style>
</head>
<body>
    <!-- 文本装饰:文本装饰线 text-decoration
     取值:
     1.none:去除装饰线 对a标签(有装饰线的)有用
     2.underline:下划线
     3.overline:上划线
     4.line-through:删除线 中划线

     更改装饰线颜色 text-decoration-color

     更改装饰线样式:  text-decoration-style
        取值:
            1.solid:实线 默认
            2.dashed:虚线
            3.dotted:点状线
            4.double:双实线
      -->
     <div>我想要蝙蝠斗</div>
     <a href="https://thatskyshop.cn/">我要买</a>
</body>
</html>
