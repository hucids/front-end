        div{
            width: 200px;
            height: 100px;
            background-color: pink;

        1.px:固定单位取值 字体大小改变需要手动改 一般32px为两个字
        2.em:相对于当前元素的字体大小 -->
    <div>扫一下STAR,在魔法生效期内与牵手的好友一起穿上特别款鬼蝠斗篷并获得进入办公室区域的能力。</div>
