<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: orange;
        }
        img{
            vertical-align: bottom;
        }
        span{
            vertical-align: 70px;
        }
    </style>
</head>
<body>
    <!-- 元素垂直对齐方式  控制同一行中行内和行内块级元素的对齐方式 默认基线对齐 vertical-align
        基线位置:在一行文本(字母x)底端 没有文本会假设有文本 会因为文本大而变化
        取值:
            1.baseline 基线对齐
            2.top 顶端对齐
            3.bottom 底端对齐
            4.middle 居中对齐 但不是正中间 
            一般不用这几个取值 因为会因字体大小变化 一般常用具体像素值单位px 取检查那里调
     -->
     <div>
        <img src="../Day02_HTML常用标签/img/图片.png" width="200px" alt="">
        <span>今天是绊爱</span>
     </div>
</body>
</html>
