<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>椰子糖的第二个网页</title>
</head>
<body>
    <!-- 标题标签 h1-h6
     特点：字体加粗 字体大小从h1到h6逐级递减 (浏览器添加的默认样式 后续学习CSS可进行修改)
    -->
    <h1>这是<strong>一级标题</strong></h1>
    <h2>这是二级标题</h2>
    <h3>这是三级标题</h3>
    <h4>这是四级标题</h4>
    <h5>这是五级标题</h5>
    <h6>这是六级标题</h6>  
     <!--h1标签一般只有一个 便于搜索引擎快速找到该网页 增大网页发现概率(搜索引擎找的是h1标题标签)  -->

     <!-- 段落标签 p 双标签
      特点：字体和正常无异 但有换行作用(段落) 段落之间有明显空格(CSS后续可消除默认空格自己设置)
      快捷键 p + 回车 -->
    <p>这是第一段</p>
    <p>这是第二段</p>

    <!-- span标签 
     包裹文字 单独用没有任何效果 不会换行 只影响所选一小部分文字 需配合CSS样式后 可是一行文本有不同的效果
      -->
    <p>这是<span style="color: blue;font-weight: bold;font-size: 30px;">第三段</span></p>
    
    <!-- 其他文本标签 文本标签：只影响一小部分文字 -->
     <!-- 1, 加粗标签 b / strong
      二者效果上没区别 但strong还有强调作用(优化搜索引擎 可在h1标题中用) 如上
     -->
      <p>这是<b>第三段</b></p>

     <!-- 2, 斜体标签 i / em
       二者效果上没区别 但em还有强调作用(优化搜索引擎)
     -->
       <p>这是<i>第四段</i></p>

     <!-- 3, 换行标签 br 单标签 
      换行作用 且两行之间不会有空格
      浏览器会忽略手动换行 对于多个空格也只显示一个空格 
     -->
      <p>这是<br>第五段</p>

     <!-- 4, 横线分隔标签 hr 样式单一 目前用得很少
     在页面中插入一条水平分隔线
     -->
     <p>这是<hr>第六段</p>

     <!-- 5, 下划线标签 u / ins 
     两个无任何区别
     -->
     <p>这是<u>第七段</u></p>
    
     <!-- 6, 删除线 s / del
     两个无任何区别
     -->
     <p>这是<s>第七段</s>吗？</p>

     <!-- 7, 上标标签 sup
     比如要显示2的6次方
     -->
      <p>2<sup>6</sup></p>

     <!-- 8, 下标标签 sub
     比如要显示水的化学式
     -->
     <p>H<sub>2</sub>O</p>
    
     <!-- 9, 字符实体 用来表示不能显示或比较麻烦的字符
      比如大于小于号 直接写浏览器会误以为是标签
      -->
      <!-- 
        使用&lt;在页面中呈现"<"
        使用&gt; 在页面中呈现">"
        使用&nbsp; 在页面中呈现一个空格
        使用&copy; 在页面中呈现版权符号"©"
        使用&yen; 在页面中呈现人民币符号"￥" 
      -->
     <p>本文本由&copy;椰子糖独家敲出</p>
    
     <!-- 10, 容器标签 
      ①div 
      可以嵌套任何标签  对比p标签(无法嵌套p标签)
      相当于收纳盒 实现网络分区 按布局写代码 结构更清晰
      且包裹的内容无任何变化(空格 大小等) 方便后续自己添加样式 无需再去除默认样式
      id属性：每个标签都可用 id命名有唯一性
      -->
     <div id="header">网页顶部区域</div>
     <div id="main">网页主体内容区域</div>
     <div id="footer">网页底部区域</div>

     <!-- 
      ②语义化标签 简洁代码
      看到标签就能知道其作用 更方便读代码
      也可以使用div + id标签实现
      -->
     <header>头部区域</header>
     <nav>导航栏区域</nav>
     <main>主体内容</main>
     <footer>底部区域</footer>

     <!-- 11, 图片标签 img
      把电脑或网页的图片引入到自己的网页上
      属性：①src 指定引入的图片路径(图片后缀名要写)
             -绝对路径：一般用于网络图片路径
             -相对路径：把图片存储到当前文件夹(./)或上一层文件夹(../)中
            ②width height 设置图片宽度和高度 默认为图片原来大小
             当宽高设置不合理时 图片会变形 可以只设置其中一个属性 另一个会自动按照宽高比调节
            ③title 图片标题 鼠标悬停时会显示的文字
            ④alt 图片引入失败时的提示 默认为一个图片的图案 可加提示文本
            -->
            <!-- 绝对路径 直接使用网络图片 -->
             <img src="https://ts1.tc.mm.bing.net/th/id/OIP-C.QnM1v4N_FMlCgvIhiA9s-wHaHR?w=225&h=209&c=8&rs=1&qlt=90&o=6&cb=ucfimg1&dpr=2&pid=3.1&rm=2&ucfimg=1" title="这是蛋蛋送的线条小狗"> 
             <!-- 网页不存在后便无法访问图片 若用根目录出发的绝对路径 会因安全性问题图片被拦截 -->
            <!-- 相对路径 -->
             <img src="./OIP-C.jpg" width="300px" height="300px" title="今天的椰子糖自习一整天be like">
            <!-- 可以在当前文件夹再单开一个img文件用来存放图片 -->
             <img src="./img/图片.png" title="一个还是很喜欢的表情包">
            <!-- 图片引入失败时 -->
             <img src="./img/图片.pn" alt="这个拍拍表情包不见了">
            <!-- 常见图片后缀：jpg png gif webp -->
            <br>

     <!-- 12, 超链接标签 a
      双标签 包裹内容可点击跳转
      属性: ①href 需要跳转的网页地址
            ②target 设置网页在哪里打开 默认当前页面(即覆盖原页面)
              - _self 在当前页面(即覆盖原页面)打开
              - _blank 在新页面打开
              - _new 第一次点开时在新页面打开 再次点开target标签值为_new的链接时会覆盖第一次打开的界面
     -->
             <a href="https://www.baidu.com" target="_blank">跳转百度</a>
             <br>
             <a href="https://music.163.com/" target="_new">跳转网易云</a>
             <br>
             <a href="https://www.taobao.com" target="_new">跳转淘宝</a>
             <br>
      <!-- a标签 设置锚点 
          跳转到本页面的某个区域
            设置锚点步骤：
             1 给需要跳转到的具体的位置创建一个锚点(id名) 可随意取
             2 链接到锚点  语法：herf = “#锚点名称”
      比如要跳转到 网页顶部区域 (很多网页会有Top键返回到顶部 可以设置一个链接到顶部的锚点 也可以用JS来做) 
      --> 
            <a href="#header">点击跳转到顶部</a>
      <!--跳转到其他页面的某个区域
            设置锚点步骤：
             1 给其他页面的标签设置锚点
             2 链接到其他页面的锚点 语法：herf = “其他页面名称#锚点名称”
                其他页面名称用相对路径写(因此其他页面的文件夹需要在同一级或上一级文件夹中)
      -->
            <br>
            <a href="../Day01_HTML/HTML介绍.html#maodian" target="_new">跳转到椰子糖的第一个网页</a>

      <!--使用图片进行跳转
            把img标签放到a标签内容区域
      -->
            <br>
            <a href="../Day01_HTML/HTML介绍.html#maodian" target="_self"><img src="./OIP-C.jpg" width="100px" title="点击这只忧伤小狗去穿越叭"></a>
      
      <!-- 13,视频标签 video 在网页中嵌入一个视频
       属性:
            1.src:指定要播放的视频的路径
            2.controls:显示浏览器默认的视频控制栏(播放/暂停 进度条 音量 全屏)只写属性无取值
            3.autoplay:页面加载完成后视频自动播放 只写属性无取值
            4.muted:默认静音播放 只写属性无取值
            5.loop:循环播放 只写属性无取值
            6.preload:控制视频预加载策略(优化加载性能)
              取值:
                -auto:默认 加载视频元数据(时长)+部分内容(视频封面会显示)  网页主要内容为这个视频
                -metadata:仅加载元数据  网页有多个视频 要用户自己选择
                -none:不预加载  视频文件过大 用户点击较少
              注:1.autoplay优先级高于preload 故两者不能同时用 否则preload会无效
                 2.preload只是给浏览器的建议 浏览器在某些情况下会自己调整(比如联网和流量下手机预加载视频会不同 以此来节省流量)
            7.width和height:设置播放器宽高  只设置一个 另一个按比例自适应
            8.poster:视频未加载完成或未播放时显示的封面 不能与自动播放一起用 默认为视频的第一帧
            -->
            <video src=""></video>
        <!-- 视频会有兼容性问题  要提供多种格式的视频源 确保在各个网站上都可显示
              常见视频格式:
                MP4 扩展名:mp4 支持现代所有的浏览器
                WbbM webm 支持谷歌chrom edge 火狐firefox
                Ogg ogg 支持谷歌chrom 火狐firefox
         -->
                <!-- 兼容性写法 source标签写在video的内部 -->
              <video controls autoplay>
                <!-- 浏览器按顺序进行检查 都不支持则显示p标签 -->
                <source src=".mp4">
                <source src=".webm">
                <p>浏览器不支持video标签</p>
              </video>
      <!-- 音频标签 audio 在网页中嵌入音频内容 
       属性:
            1.src:指定要播放的音频的路径  如果为视频默认获取里面的音频
            2.controls:显示浏览器默认的视频控制栏(播放/暂停 进度条 音量)只写属性无取值
            3.autoplay:页面加载完成后音频自动播放 只写属性无取值  要配合muted来使用(大部分浏览器要求音频静音才能自动播放)
            4.muted:默认静音播放 只写属性无取值
            5.loop:循环播放 只写属性无取值
            6.preload:控制音频预加载策略(优化加载性能)
              取值:
                -auto:默认 加载音频元数据(时长)+部分内容
                -metadata:仅加载元数据  
                -none:不预加载 
              注:1.autoplay优先级高于preload 故两者不能同时用 否则preload会无效
                 2.preload只是给浏览器的建议 浏览器在某些情况下会自己调整(比如联网和流量下手机预加载视频会不同 以此来节省流量)
            7.poster:视频未加载完成或未播放时显示的封面 不能与自动播放一起用 默认为视频的第一帧
           -->
          <audio src="" controls autoplay muted></audio>

          <!-- 兼容性问题
              音频格式:
                mp3 .mp3 支持现代所有浏览器
                WAV .wav 谷歌 edge 火狐
                OGG .ogg 谷歌 火狐 -->
          <audio controls autoplay muted>
                <!-- 浏览器按顺序进行检查 都不支持则显示p标签 -->
                <source src=".mp3">
                <source src=".wav">
                <p>浏览器不支持audio标签</p>
              </audio>
</body>
</html>
