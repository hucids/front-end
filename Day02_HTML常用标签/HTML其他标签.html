<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>椰子糖的第二个网页续集</title>
</head>
<body>
    <!-- 常用结构标签(一套套按对应结构去写的标签)
        1 列表标签：无序列表 有序列表 定义列表
    -->

    <!-- ① 无序列表 顺序不重要
            ul标签 创建无序列表
            li标签 来代表其中每一个列表项 默认会有一个实心圆点代表一个列表项 且会换行
            
            ul中放其他标签不会报错 但不规范
    -->
        <p>椰子糖想做的事 (这些没有顺序区分 都想做)</p>
        <ul>
            <li>敲代码</li>
            <li>看电影</li>
            <li>打游戏</li>
            <li>去商业街乱逛</li>
            <li>看书</li>
            <li>画画</li>
            <li>练琴</li>
        </ul>

    <!-- ② 有序列表 顺序很重要  (比如 排名)
            ol标签 创建有序列表
            li标签 来代表其中每一个列表项 默认使用阿拉伯数字明确表示顺序 且会换行

            ol中放其他标签不会报错 但不规范
    -->
        <p>椰子糖的梦想 (大梦想 小梦想 有顺序)</p>
        <ol>
            <li>自由</li>
            <li>热爱</li>
            <li>规律且变化</li>
        </ol>
        <h6>好吧 其实都很向往</h6>

    <!-- ③ 定义列表 类似一本词典 对里面的词语进行解释
            dl标签 创建定义列表
            dt标签 代表要解释的词语
            dd标签 词语的释义
    -->
        <dl>椰子糖的家庭成员
            <dt>椰子糖</dt>
            <dd>这是一个人</dd>
            
            <dt>金鱼</dt>
            <dd>这是一条鱼</dd>
            <dd>不会游泳</dd>

            <dt>🎃</dt>
            <dd>这是一个南瓜</dd>

            <dt>🐑</dt>
            <dd>这是一只羊</dd>

            <dt>脚趾</dt>
            <dd>其实他叫乔治</dd>
        </dl>

        <!-- 列表嵌套 -->
            <!-- 无序列表的嵌套 每一层用实心圆或空心圆区分 -->
            <ul>大购物袋
                <li>小购物袋装水果
                    <ul>
                        <li>苹果</li>
                        <li>西瓜</li>
                        <li>梨子</li>
                    </ul>
                </li>
                <li>小购物袋装蔬菜
                    <ul>
                        <li>生菜</li>
                        <li>西红柿</li>
                        <li>西蓝花</li>
                    </ul>
                </li>
            </ul>

</body>
</html>
