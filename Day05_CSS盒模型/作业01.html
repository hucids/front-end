<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        div{
            /* 解决两个盒子间的间距(基线对齐)  设置盒子大小 */
            width: 200px;
            height: 200px;
            /* background-color: orange; */
            /* 内边距 */
            padding: 10px;
            /* 边框 */
            border: 10px solid #eee;
        }
        img{
            /* 使图片大小与盒子相同 */
            width: 200px;
            height: 200px;
        }
        .box{
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div>
        <img src="./img/lol_1734000073_uploadnewsImg.webp" alt="">
    </div>
    <div class="box">
        <img src="./img/lol_1734420612_uploadnewsImg.webp" alt="">
    </div>
</body>
</html>
