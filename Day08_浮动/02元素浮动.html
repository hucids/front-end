<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 标准流:基础的布局规则 (文档流)
     特点:
        1.-块级元素从上到下依次排列 每个块级元素独占一行
          -行内级元素从左到右水平排列 直到排满这一行 再拍下一行
        2，元素的宽高
          -块级元素默认占满元素宽度 高度由内容决定 宽高可自由设置
          -行内级元素宽高默认有内容决定 不可自由设置
        3.元素的位置
          -元素在标准流中位置相对而言是固定的
     -->

    <!-- 浮动 float 不受标准流限制
     浮动两个方向:
        1.左浮动:left
        2.右浮动:right
     给元素设置浮动 元素脱离标准流 不再占据原来标准流位置(飞起来 碰到父元素边界或其他浮动元素时(会紧挨着相邻浮动元素)为止) 后面元素自动填充
     浮动流和标准流不在一层

     假设上下相邻元素不是浮动元素 
        -相邻元素为块级元素:会在本行进行浮动
        -相邻元素为行内级元素:会上去(因为行内级元素不占整行) 会把元素挤开 不会覆盖(可用于做图文环绕)
     
     注:水平方向剩下空间不够显示浮动元素 浮动元素会向下移动来找到足够大的空间为止
        浮动元素不会挡住正常内容的显示 浮动元素会将文字推开内容围绕在浮动元素周围显示
        -->

    <!-- 浮动好处:
        1.元素转换会出现空格解析问题 还要另外处理 浮动不会
        2.行内块级元素不能完全实现元素对齐(字体大小不同时基线位置不一致了) 浮动不会(浮动不是用基线对齐)
        
         浮动问题:
        1.父元素高度(边框)塌陷 当父元素未设置宽高时 父元素有内部内容撑起来 浮动后元素飞走 没有内容会塌陷
            解决方法:
                -给父元素设置固定宽高  但内容增加易导致溢出
                -bfc机制:给父元素设置 overflow:hidden 会触发 此时父元素会得到高度 且会随内容而变化
     -->
</body>
</html>
