<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div::before{
            /* content里面是要插入的内容 选不中 */
            content:"我是";
            color: red;
        }
    </style>
</head>
<body>
    <!-- 伪元素:用于选中元素特定的部分 且允许在文档中插入一些额外的样式或内容
     以(::)开头 且必须配合content属性使用
     ::before:在选中的元素的内容前插入内容 被插入的内容是一个虚拟的子元素 行内级元素
     ::after
     -->
     <!-- 扩展成一句话 且不改结构 -->
     <div>曲奇</div>
</body> 
</html>
