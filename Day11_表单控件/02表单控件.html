<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 表单控件 行内块级标签
     1.input框  主要拿来输入单行文本 可通过type不同取值展示不同效果
        -type取值:
            -text:输入文本 可以显示内容
            -password:输入密码 不显示内容 显示圆点
    -->
     <input type="text">

     <!-- 2.下拉列表 select定义整个列表 option定义里面的某一项 -->
      <h2>选择你所在的城市</h2>
      <select name="" id="">
        <option value="">北京</option>
        <option value="">南京</option>
        <option value="">上海</option>
      </select>

     <!-- 3.button按钮 -->
       <button>登录</button>

     <!-- 4.文本域:接收多行文本的输入 -->
      <textarea name="" id=""></textarea>
</body>
</html>
