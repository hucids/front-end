<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 其他属性
     1.name:设置控件名称 用户自定义 后续与值一起发送给后端
     2.value:设置控件的值(用户自定义)  一般输入框不需要设置 因为会自动提交所写内容
     3.placeholder:设置输入框中的提示文本(用户自定义) 一旦开始输入 提示性文本会消失
     4.checked:设置单选按钮或多选按钮的默认选中 无取值
     5.autofocus:自动聚焦(光标自动移入到输入框中) 无取值
     6.disabled:禁止选中 禁止输入
     7.selected:下拉框默认选取
     -->
</body>
</html>
