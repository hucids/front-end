<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>椰子糖的第三个网页</title>
    <!-- 内部样式 -->
    <style>
        /* 标签选择器 根据标签名选择对应的元素 */
        div{
            color: red;
            font-size: 20px;
        }
    </style>
    <!-- 引入样式文件
     rel：引入文件资源类型
     href：文件路径
     -->
    <link rel="stylesheet" href="./css/css外部样式.css">
</head>
<body>
    <!-- CSS 层叠样式表 给标签设置样式 -->
    
    <!-- CSS书写位置 -->
    <!-- 1.行内样式/内联样式  直接在标签内部用style标签来设置样式
     语法: <标签名 style=“样式声明”> 
        -样式声明；由css属性和属性值组成
     多个样式接着写 用“；”隔开
    -->
    <p style="color: pink; font-size: 30px;">椰子糖爱吃巧克力</p>

    <!-- 2.内嵌样式/内部样式  将样式放入style标签中 再放在head中
     style标签中用选择器选择元素
     选择器：通过标签名或某些属性 找到对应的元素
        语法：<style>
                选择器{
                    属性：值；
                }
             </style>
    -->
    <div>椰子糖还爱吃巧克力面包</div>

    <!-- 3.外部样式  创建css文件放样式 再引入
     创建css样式时要用.css结尾
     在head中用link标签引入css样式文件
     css文件中也要用选择器来选择某个元素
    -->
    <span>今天是2026年1月28日 椰子糖在学前端基础中。。。</span>

    <!-- 三种方式对比
     行内样式：书写方便  不可重复利用，不便于维护  代码量少时可用
     内部样式：部分结构与样式分离，部分复用(在同一文件下可复用)  样式与当前页面联系紧密且确认不用在其他文件复用时可用
     外部样式：结构和样式完全分离，可以服用(不同文件之间)  但代码量少的情况下反而麻烦  代码量很大且样式要用于其他文件(比如在不同节日时某网页不同的特效 只需要改变引入的特定文件即可)
     -->
</body>
</html>
