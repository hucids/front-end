<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>椰子糖的第三个网页续集</title>
</head>
<body>
    <!-- 样式表的特征：层叠性 继承性 优先级 -->

    <!-- 层叠性：多数不冲突的css样式共同作用与同一元素时 都可以应用上 -->
    <!-- 继承性：css样式会自动被子元素继承 -->
    <div style="color: green;">茄子
        <p>
            土豆
        </p>
    </div>
    <!-- 优先级：多组冲突的css样式共同作用于同一种元素时 遵循就近原则
     就近原则：行内样式 > 内部样式 > 外部样式 > 默认样式和继承来的样式
     
     优先级一致时 看代码书写顺序 代码从上往下运行 冲突元素会被后来者覆盖 因此后来者生效
     -->
</body>
</html>
