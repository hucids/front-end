    <!-- 绝对定位:相对于最近的已经定位(除了static之外的定位 一般用relative不脱离标准流 保持原来位置不动)的祖先元素进行定位 没有则相对于浏览器视口  absolute
     子绝父相:子元素用绝对定位 定位父级最好用相对定位
     特点:
        1.脱离标准流 会引起父级元素高度塌陷
        2.可给绝对定位的元素设置宽高(行内级元素也可以)
     特殊用法:可让元素在父级中垂直水平居中
     left top优先级高于其他两个
      -->
