<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
    1.img标签
        -html内元素 不可缺少
        -会占据页面空间 会参与布局
        -在浏览器中右键图片可以复制图片链接且另存为
        -不支持CSS精灵图技术
    2.backgroun-img属性
        -CSS样式 可有可无 精致度
        -不占据页面空间 依靠元素存在
        -在浏览器中右键图片不可另存和复制链接 只能在检查代码中找 此时可复制
        -支持CSS精灵图技术
     -->
</body>
</html>
