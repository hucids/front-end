<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- JavaScript 浏览器解释型语言 脚本语言 -->
     <!-- js书写位置
      1.元素绑定事件(类似CSS行内样式)  用得少
      2.文档内嵌(类似CSS内部样式)
        注:script可以写在任意位置 但一般放body最后(确保html全部加载完毕)
      3.外部链接(类似于CSS外部样式)
        新建js文件(文件名随意 后缀名为.js) 引入到页面中(用script引入)
        注:引入用的script中不能再添加其他东西 可能会出现问题
     -->
    <button onclick="console.log('hello world');">点击</button>

    <script>
        // js代码(不同代码注释符号不同)
        console.log('hello')
    </script>
    <script src="./js/01外部链接.js"></script>

    <!-- js书写规范 与py一致
     1.严格区分字母大小写
     2.符号一定使用英文符号 且双引号中只能包裹单引号或反引号
     -->
</body>
</html>
