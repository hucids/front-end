<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- js变量介绍
     变量:存储数据
     js中一定要声明变量才能使用(使用var关键字声明一个变量)
     注意事项:
        1.变量未定义未赋值 直接访问会报错
        2.变量定义未赋值 初始值显示undefined
        3.变量省略var关键字 直接赋值 可正常使用 但会影响变量作用域

     变量命名规则:
     1.由字母 数字 下划线 美元符号组成
        变量名不能以数字开头 可以但不推荐中文命名
     2.区分大小写 a A 不同变量
     3.避免使用关键字作为变量名(也不用记 报错时再改)
     -->
    <script>
        var a;  // 声明变量
        a = 10;  // 变量赋值 符号两边可加上空格更美观

        var b, c, d; // 同时声明多个变量
        var aa = 1, bb = 2, cc = 3; // 同时声明并赋值多个变量
    </script>
</body>
</html>
