<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>优先级</title>
    <style>
        div{
            color: red !important;
        }
    </style>
</head>
<body>
    <!-- 选择器优先级: 页面通过选择器查找元素时的速度 速度越快 优先级越高 可用权重的方式来表示
     通配符选择器和继承的样式   权重 0
     标签选择器                权重 1
     类选择器                  权重 10
     id选择器                  权重 100
     行内样式                  权重 1000
     
     权重越大 优先级越高
     
     复杂选择器优先级 最终权重为各个选择器权重之和
     例如:
        后代选择器 p .one{}   权重 1+10=11
                  div p{}    权重 1+1=2
        相邻兄弟选择器 #box+.one{}  权重100+10=110
        组合选择器 p.one{}   权重1+10=11
        
        并集选择器的权重以每个选择器单独权重为准
    
     当要强制使用某个样式时:
     1.提升优先级(使用复杂选择器 但要算一下权重是否更高)
     2.行内样式
     3.使用!.important 此时优先级最高 确保某个样式一定被应用
    -->
    

</body>
</html>
