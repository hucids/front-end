    <!-- flex布局: Flexbox 弹性盒子布局
     1.flex容器(flex-container):包含了一组flex项目的父元素
        通过设置容器的display属性为flex或inline-flex来启用Flex布局
            flex时为块级元素 inline-flex时为行内块级元素
     2.flex项目(flex-items):flex容器内的直接子元素 可通过操作flex容器来操作flex项目
     3.主轴:Flex容器的主要方向 Flex项目在主轴上进行排列 主轴的方向不是固定的 可根据设置来改变
     4.交叉轴:与主轴垂直的方向 用于辅助排列Flex项目 交叉轴看主轴 不能单独更改
        -->
</body>
