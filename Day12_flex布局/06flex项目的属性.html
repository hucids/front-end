<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
    1.order 定义flex项目的排列顺序
        取值是没有单位的数值 越小越靠前 可正可负 默认为0
    2.align-self 用于定义单个flex项目在交叉轴上的对齐方式
        取值:
            1.auto 默认值 元素继承flex容器的align-items属性
            2.flex-start 在交叉轴起点方向对齐
            3.flex-end
            4.center
            5.baseline 基线
    3.flex-grow:项目在容器中分配多余空间的比例
        取值: 是没有单位的数值 数值越大 分配的多余空间越多
            -都为1:平均分配
    4.flex-shrink:项目在容器中不足空间是缩小的比例
        取值: 是没有单位的数值 数值越大 缩小的空间越多
     -->
</body>
</html>
