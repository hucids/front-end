<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <!-- 定义flex项目在主轴上的对齐方式(以从左到右为例)
     justify-content
     取值:
        1.flex-start 起点对齐 靠主轴的起点方向对齐
        2.flex-end 终点对齐 靠主轴终点方向对齐
        3.center 居中对齐 在主轴中间对齐
        4.space-between 两端对齐
        5.space-around 项目和边框间距离相等 且都为项目与项目之间距离的一半
        6.space-evenly 项目与项目 项目与边框间距离都相等
     -->
</body>
</html>
