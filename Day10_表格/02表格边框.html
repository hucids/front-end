<body>
    <!-- 表格边框 td,th加border样式 但会有双层边框
     解决双层边框:border-collapse 设置边框折叠方式 给table加
     取值:
        1.separate 边框分离 双层边框 默认
        2.collapse 折叠 单层边框
        
    当border-collapse:separate时 可生效的样式:
     1.border-spacing:单位px 控制相邻单元格边框之间的距离 两个边框键距离
     2.empty-cells:控制空白单元格是隐藏还是显示 取值:hide(隐藏) show(显示 默认)
     -->
</body>
</html>
