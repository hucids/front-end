<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        div{
            width: 200px;
            height: 200px;
            background-color: transparent;
            transition-property: all;
            transition-duration: 2s;
        }
        div:hover{
            transition-delay: 1s;
            background-color: orange;
            width: 400px;
            height: 400px;
        }
    </style>
</head>
<body>
    <!-- 元素的过渡效果 让元素从一种样式逐渐改变为另一种样式
     transition: 写到元素本身 有淡入淡出的效果 写到hover上有淡入速出效果
     取值:
        1.-property:指定要过渡的CSS属性 多个属性逗号分隔 写all代表所有hover属性下有变化的属性
        2.-duration:过渡持续的时间 s/ms 为单位
        3.-timing-function:过渡的时间函数 定义过渡期间速度变化
        4.-delay:过渡开始前的延迟时间 s/ms为单位 
            写到元素本身 放入和出来都有延迟 
            写到hover 放入有延迟 放出无延迟
     -->

     <!-- transition-timing-function
      取值:
        1.ease:开始和结束缓慢 中间加速 默认
        2.linear:匀速
        3.ease-in:开始慢 逐渐加速
        4.ease-out:开始快 逐渐减速
        5.ease-in-out:先加速 后匀速 之后减速 -->
    <div>曲奇</div>
</body>
</html>
