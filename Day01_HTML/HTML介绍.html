<!DOCTYPE html>   <!--文档类型声明(DTD) 不是标签 作用是告诉浏览器这个网页的html版本 (目前用html5)-->
<html lang="en">  <!--html 根标签 所有网页中最大的标签 包裹所有内容-->
<!-- lang属性 定义网页语言 英文 en  中文 zh-cn 英文会多一个是否翻译弹窗 -->
<head>  <!--head 头部标签 存放页面相关配置或者引入资源-->
    <!-- meta 辅助标签 只能靠属性发挥作用 -->
    <!--charset属性 定义编码格式  -->
    <meta charset="UTF-8">
    <!-- 配置移动端信息 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title 标题标签 定义网页的标题 -->
    <title>慧慧的第一个网页</title>
</head>
<body>  <!--body 网页主体内容-->
    <!-- 笔记 -->
    1, 基本模版 ! + 回车键
    2, 写完代码后要保存 Ctrl + s  (文件有小白点则未保存)
    3, 语法部分 符号用英文 其余可用中文符
    4, Open with live server 运行 页面可自动随代码改变而更新
       Open in D(默认浏览器) / Open in O(可选浏览器) 当改变代码时 要刷新页面才会更新
    5, 注释 Ctrl + / <!--  -->
    6, 属性: 书写在开始标签的标签名后面 用空格隔开 属性名=属性值(也可以只有属性值) 属性用引号 多个属性空格隔开
             所有元素都可以添加属性  属性作用: <!-- 1,为元素提供额外的属性和信息
                                                2，为元素添加名字
                                                    -->
    <!-- 
    6, 标签  <标签名>  每个标签都有对应效果 
                      标签名不区分大小写 但推荐统一小写
        标签分为 单标签 双标签
            单标签(自结束标签)：只有 开始标签<> 不能包裹内容 最终渲染效果由属性决定
            双标签：有 开始标签<> 结束标签</> 两者中间可以包裹内容(标签内容区域)

      -->
    <p id="maodian">此处为慧慧创建的锚点</p>
    <br>
    <a href="../Day02_HTML常用标签/HTML普通标签.html#header" target="_self"><img src="../Day02_HTML常用标签/OIP-C.jpg" width="100px" title="再次点击穿越回去"></a>
    <!-- windows系统中文件路径分隔符为\ 但在html的src属性中要用/ 因此若有\的路径需要改 -->

</body>
</html>
