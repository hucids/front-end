<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 默认样式去除 */
        *{
            padding: 0;
            margin: 0;
        }
        /* 列表默认样式去除 */
        ul,li{
            list-style: none;
        }
        body{
            height: 1500px;
        }
        .wrap{
            width: 100%;
            height: 300px;
            background-color: #441b79;
            position: fixed;
            top: 184px;
        }
        .wrap .box{
            width: 220px;
            height: 50px;
            background-color: #188eee;
            color: #fff;
            /* 居中 */
            text-align: center;
            line-height: 50px;
            font-weight: bold;
            font-size: 15px;
            position: absolute;
            left: 150px;
            top: -50px;
        }
        .wrap .nav{
            width: 220px;
            height: 425px;
            background-color: #0477c0;
            position: absolute;
            left: 150px;
        }
        .wrap .nav li{
            height: 70px;
            border-bottom: 1px solid #1681c4;
            color: #fff;
            line-height: 70px;
            font-weight: bold;
            /* 设置内边距 里面两个盒子都可应用 */
            padding: 0 15px;
            cursor: pointer;
        }
        .wrap .nav li span:nth-child(2){
            float: right;
        }
        .wrap .nav li .show{
            width: 980px;
            height: 425px;
            position: absolute;
            left: 220px;
            top: 0;
            padding: 15px;
            box-sizing: border-box;
            /* 隐藏元素 */
            display: none;
        }
        .wrap .nav li:nth-child(1):hover .show{
            display: block;
            background-color: #ffc0cb;
        }
        .wrap .nav li:nth-child(2):hover .show{
            display: block;
            background-color: green;
        }
        .wrap .nav li:nth-child(3):hover .show{
            display: block;
            background-color: saddlebrown;
        }
        .wrap .nav li:nth-child(4):hover .show{
            display: block;
            background-color: rgb(17, 190, 234);
        }
        .wrap .nav li:nth-child(5):hover .show{
            display: block;
            background-color: orange;
        }
        .wrap .nav li:nth-child(6):hover .show{
            display: block;
            background-color: firebrick;
        }
        /* 错误做法 会改变布局 使导航栏处的盒子往上移 */
        /* .wrap .nav li:hover{
            position: absolute;
            top: 0;
            left: 220px;
            width: 980px;
        } */

        /* 改进: 可增加动画  */
    </style>
</head>
<body>
    <!-- 用.wrap可直接生成class名为wrap的盒子 -->
     <!-- 背景 -->
     <div class="wrap">
        <!-- 上方文字 -->
        <div class="box">全部课程</div>
        <!-- 下方导航栏 -->
         <ul class="nav">
            <li>
                <span>IT·互联网</span>
                <span>></span>
                <div class="show">IT·互联网</div>
            </li>
            <li>
                <span>设计·创作</span>
                <span>></span>
                <div class="show">设计·创作</div>
            </li>
            <li>
                <span>语言·留学</span>
                <span>></span>
                <div class="show">语言·留学</div>
            </li>
            <li>
                <span>职业·考证</span>
                <span>></span>
                <div class="show">职业·考证</div>
            </li>
            <li>
                <span>升学·考研</span>
                <span>></span>
                <div class="show">升学·考研</div>
            </li>
            <li>
                <span>兴趣·生活</span>
                <span>></span>
                <div class="show">兴趣·生活</div>
            </li>
         </ul>
     </div>
</body>
</html>
