<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        body{
            background-image: url(./img/bgi.jpg);
        }
        .box{
            width: 400px;
            height: 600px;
            float: left;
            margin-left: 100px;
            position: relative;
            /* 超出部分选择隐藏 */
            overflow: hidden;
        }
        .box img{
            width: 400px;
            height: 600px;
        }
        .box div{
            width: 400px;
            height: 600px;
            background-color: rgba(201, 115, 93, 0.5);
            position: absolute;
            top: 0;
            left: 0;

            transform: rotate(90deg);
            transform-origin: right bottom;
            transition: all 1s;
            /* display: none; */
        }
        .box div p{
            font-size: 16px;
            color: #fff;
            line-height: 50px;
            text-indent: 2em;
            margin: 10px 50px;
        }
        .box:hover div{
            transform: rotate(0deg);
            /* 无法有过渡效果 */
            /* display: block; */
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="./img/1.jpg" alt="">
        <div>
            <p>
                桔梗，战国时代灵力数一数二的巫女，负责守护及净化四魂之玉，以强大的灵力与精准的箭术击退对玉虎视眈眈的妖怪们 ，是犬夜叉最心爱的女子之一。后来桔梗被暗恋者鬼蜘蛛所嫉妒。鬼蜘蛛托生的半妖奈落设计使二人反目成仇。重伤的桔梗忍痛将携玉逃跑的犬夜叉封印，随后带玉身亡。
            </p>
        </div>
    </div>
    <div class="box">
        <img src="./img/2.png" alt="">
        <div>
            <p>
                犬夜叉,是大妖怪犬大将与人类公主十六夜所生的半妖，因为半妖身份而被人类和妖怪所排斥，为此犬夜叉想通过魂之玉的力量使自己变成完全的妖怪，后在争夺四魂之玉中爱上了人类女子桔梗而想变成人类，后来被奈落使用离间计陷害，与桔梗反目成仇，在盗取四魂之玉时，被桔梗封印五十年，桔梗带玉身亡。
            </p>
        </div>
    </div>
</body>
</html>
